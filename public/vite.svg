<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="220" fill="url(#purpleGrad)" filter="url(#shadow)" />
  <circle cx="256" cy="256" r="180" fill="#0f172a" />
  <!-- Hands -->
  <line x1="256" y1="256" x2="256" y2="120" stroke="url(#purpleGrad)" stroke-width="24" stroke-linecap="round" />
  <line x1="256" y1="256" x2="360" y2="256" stroke="url(#purpleGrad)" stroke-width="24" stroke-linecap="round" />
  <!-- Center pin -->
  <circle cx="256" cy="256" r="28" fill="#ffffff" />
  <circle cx="256" cy="256" r="12" fill="#6366f1" />
</svg>
